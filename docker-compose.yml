version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: support_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support_platform

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: support_redis

    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4-management
    container_name: support_rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data: